[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os

# DATABASE_URL 환경변수에서 동적으로 로드한다 (alembic/env.py).
# 본 파일에 평문 자격증명을 박지 않는다 (§12.10).
sqlalchemy.url = postgresql+asyncpg://placeholder/placeholder

[post_write_hooks]
hooks = ruff
ruff.type = console_scripts
ruff.entrypoint = ruff
ruff.options = format REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
