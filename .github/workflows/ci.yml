# Geno Finder — Lint & Test CI
# 보안 gate 는 security-gates.yml 에 분리.

name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  python:
    name: ruff + mypy + pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install uv
      - name: api
        run: |
          cd apps/api
          uv venv .venv
          # TODO(verify): 의존성 추가 후 활성화
          # uv pip install -e .[dev]
          # uv run ruff check .
          # uv run mypy src
          # uv run pytest
          echo "TODO: deps pinned 후 활성화"
      - name: workers
        run: |
          cd apps/workers
          uv venv .venv
          # uv run ruff check .
          # uv run mypy src
          # uv run pytest
          echo "TODO: deps pinned 후 활성화"

  web:
    name: eslint + tsc + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: corepack enable && corepack prepare pnpm@9 --activate
      - name: install + lint + typecheck + build
        run: |
          cd apps/web
          # TODO(verify): pnpm-lock.yaml 생성 후 frozen-lockfile 로 변경
          pnpm install
          pnpm lint
          pnpm typecheck
          pnpm build
